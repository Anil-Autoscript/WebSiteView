name: Build & Release Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      release_type:
        description: 'Release type'
        required: true
        default: 'debug'
        type: choice
        options: [ debug, release ]

env:
  JAVA_VERSION: '17'
  GRADLE_VERSION: '8.4'

jobs:
  # ───────────────────────────────────────────────────
  # JOB 1 — Build Debug APK  (every push / PR)
  # ───────────────────────────────────────────────────
  build-debug:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Setup Gradle (downloads wrapper jar automatically)
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace --no-daemon

      - name: List APKs
        run: find . -name "*.apk"

      - name: Upload Debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk-build-${{ github.run_number }}
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30

      - name: Upload build reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-reports-${{ github.run_number }}
          path: app/build/reports/

  # ───────────────────────────────────────────────────
  # JOB 2 — Build Release APK  (push to main/master only)
  # ───────────────────────────────────────────────────
  build-release:
    name: Build Release APK
    runs-on: ubuntu-latest
    if: github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'

      - name: Build Release APK
        run: ./gradlew assembleRelease --stacktrace --no-daemon

      - name: Upload Release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apk-build-${{ github.run_number }}
          path: app/build/outputs/apk/release/*.apk
          retention-days: 90

  # ───────────────────────────────────────────────────
  # JOB 3 — Create GitHub Release  (on version tags v*)
  # ───────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [ build-debug, build-release ]
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'

      - name: Build both APKs
        run: ./gradlew assembleDebug assembleRelease --no-daemon

      - name: Get version tag
        id: version
        run: echo "TAG=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Stage release files
        run: |
          mkdir -p dist
          cp app/build/outputs/apk/debug/app-debug.apk \
             "dist/WebViewerPro-${{ steps.version.outputs.TAG }}-debug.apk"
          REL=$(find app/build/outputs/apk/release -name "*.apk" | head -1)
          cp "$REL" "dist/WebViewerPro-${{ steps.version.outputs.TAG }}-release.apk"
          ls -lh dist/

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.TAG }}
          name: "WebViewer Pro ${{ steps.version.outputs.TAG }}"
          body: |
            ## WebViewer Pro ${{ steps.version.outputs.TAG }}

            ### Downloads
            | File | Use case |
            |------|----------|
            | `*-debug.apk` | Sideload for testing |
            | `*-release.apk` | Production / distribution |

            ### How to install
            1. Download an APK below
            2. On Android go to **Settings → Security → Install unknown apps**
            3. Open the APK and tap **Install**

            > Built automatically by GitHub Actions
          files: dist/*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
